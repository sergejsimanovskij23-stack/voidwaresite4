<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/jpeg" href="/favicon.jpg" />
    <link rel="shortcut icon" href="/favicon.jpg" />
    <title>Вход в профиль | VoidWare</title>
    <meta name="description" content="Вход в личный кабинет VoidWare." />
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html,
        body {
            overflow-x: hidden;
            max-width: 100%;
            background: #07070d;
            color: #fff;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            scroll-behavior: smooth;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
        img {
            max-width: 100%;
            height: auto;
            display: block;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            pointer-events: none;
        }
        a {
            text-decoration: none;
            color: inherit;
            user-select: none;
            -webkit-user-select: none;
        }

        ::-webkit-scrollbar {
            width: 6px;
            background: #0a0a14;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #7C3AED, #EC4899);
            border-radius: 12px;
        }

        .glass {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .gradient-text {
            background: linear-gradient(135deg, #a78bfa, #ec4899, #f59e0b, #a78bfa);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientMove 6s ease-in-out infinite alternate;
        }
        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 2rem;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.01em;
            background: linear-gradient(135deg, #7C3AED, #EC4899);
            color: #fff;
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 0 0 rgba(124, 58, 237, 0);
            position: relative;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            width: 100%;
            justify-content: center;
        }
        .btn-primary::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 9999px;
            background: linear-gradient(135deg, #6d28d9, #db2777);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 40px rgba(124, 58, 237, 0.35);
        }
        .btn-primary:hover::after {
            opacity: 1;
        }
        .btn-primary span {
            position: relative;
            z-index: 1;
        }

        .login-card {
            border-radius: 2rem;
            padding: 2.5rem 2.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            max-width: 440px;
            margin: 0 auto;
            backdrop-filter: blur(10px);
        }
        .login-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 2rem;
            padding: 1.5px;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.3), rgba(236, 72, 153, 0.3));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        .login-card:hover::before {
            opacity: 1;
        }
        .login-card:hover {
            border-color: rgba(124, 58, 237, 0.2);
            box-shadow: 0 20px 60px rgba(124, 58, 237, 0.08);
        }

        .login-card .form-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
            display: block;
        }
        .login-card .form-input {
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
            font-family: inherit;
        }
        .login-card .form-input:focus {
            border-color: rgba(124, 58, 237, 0.4);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.08);
        }
        .login-card .form-input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .error-message {
            color: #f87171;
            font-size: 0.85rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 1rem;
            display: none;
        }

        .falling-blocks-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .falling-block {
            position: absolute;
            width: 24px;
            height: 24px;
            background: rgba(124, 58, 237, 0.1);
            border: 1px solid rgba(124, 58, 237, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(45deg);
            animation: fall linear infinite;
            opacity: 0;
            font-size: 14px;
        }
        @keyframes fall {
            0% {
                transform: translateY(-50px) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(calc(100vh + 100px)) rotate(720deg) scale(1.2);
                opacity: 0;
            }
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.5;
        }

        .content {
            position: relative;
            z-index: 2;
        }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .header-transition {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (max-width: 640px) {
            .login-card {
                padding: 1.8rem 1.5rem;
                border-radius: 1.5rem;
            }
        }

        .no-select {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
        * {
            -webkit-touch-callout: none;
        }

        .footer-guard {
            color: rgba(255, 255, 255, 0.25);
            font-weight: 600;
            letter-spacing: 0.1em;
            margin-top: 0.2rem;
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .btn-primary.loading .btn-text {
            display: none;
        }
        .btn-primary.loading .spinner {
            display: block;
        }
        .btn-primary.loading {
            pointer-events: none;
            opacity: 0.7;
        }
    </style>
</head>

    <script>
        // ============================================
        // ЗАЩИТА
        // ============================================
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12') { e.preventDefault();
                return false; }
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) { e.preventDefault();
                return false; }
            if (e.ctrlKey && e.key === 'u') { e.preventDefault();
                return false; }
            if (e.ctrlKey && e.key === 's') { e.preventDefault();
                return false; }
        });
        document.addEventListener('selectstart', function(e) {
            if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') e.preventDefault();
        });
        document.addEventListener('dragstart', function(e) { e.preventDefault(); });
        document.addEventListener('copy', function(e) {
            if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') e.preventDefault();
        });
        console.log = console.warn = console.error = console.info = console.debug = function() {};
        console.clear();
        document.querySelectorAll('img').forEach(img => {
            img.addEventListener('contextmenu', function(e) { e.preventDefault();
                return false; });
        });
        if (window.top !== window.self) window.top.location = window.self.location;

        // ============================================
        // ОСНОВНАЯ ЛОГИКА
        // ============================================

        const header = document.getElementById('mainHeader');
        let ticking = false;
        window.addEventListener('scroll', () => {
            if (!ticking) {
                requestAnimationFrame(() => {
                    if (window.scrollY > 10) {
                        header.style.backdropFilter = 'blur(16px)';
                        header.style.backgroundColor = 'rgba(7,7,13,0.85)';
                    } else {
                        header.style.backdropFilter = 'blur(0px)';
                        header.style.backgroundColor = 'rgba(7,7,13,0.8)';
                    }
                    ticking = false;
                });
                ticking = true;
            }
        });

        // ── Particles ──
        (function initParticles() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];
            const PARTICLE_COUNT = 100;

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.size = Math.random() * 2 + 0.5;
                    this.speedX = (Math.random() - 0.5) * 0.3;
                    this.speedY = (Math.random() - 0.5) * 0.3;
                    this.opacity = Math.random() * 0.5 + 0.2;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x < 0 || this.x > width) this.speedX *= -1;
                    if (this.y < 0 || this.y > height) this.speedY *= -1;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(167, 139, 250, ${this.opacity})`;
                    ctx.fill();
                    ctx.shadowColor = 'rgba(124, 58, 237, 0.2)';
                    ctx.shadowBlur = 6;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push(new Particle());
            }

            function animateParticles() {
                ctx.clearRect(0, 0, width, height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 140) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(167, 139, 250, ${0.06 * (1 - dist / 140)})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animateParticles);
            }
            animateParticles();
        })();

        // ── Falling Blocks ──
        (function initFallingBlocks() {
            const container = document.getElementById('fallingBlocks');
            const blockCount = 25;
            const icons = ['⛏️', '⚔️', '💎', '🛡️', '🚀', '✨'];
            for (let i = 0; i < blockCount; i++) {
                const block = document.createElement('div');
                block.className = 'falling-block';
                block.textContent = icons[Math.floor(Math.random() * icons.length)];
                block.style.left = Math.random() * 100 + '%';
                block.style.animationDuration = (Math.random() * 8 + 6) + 's';
                block.style.animationDelay = (Math.random() * 10) + 's';
                block.style.width = (Math.random() * 18 + 18) + 'px';
                block.style.height = block.style.width;
                block.style.fontSize = (parseInt(block.style.width) * 0.6) + 'px';
                container.appendChild(block);
            }
        })();

        // ── Reveal ──
        (function initReveal() {
            const reveals = document.querySelectorAll('.reveal');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.15 });
            reveals.forEach(el => observer.observe(el));
        })();

        // ── Функция загрузки файла ──
        function loadFile(url) {
            return fetch(url)
                .then(res => {
                    if (!res.ok) throw new Error(`Не удалось загрузить ${url}`);
                    return res.text();
                })
                .then(text => text.split('\n').filter(line => line.trim() !== ''));
        }

        // ── Обработка формы входа ──
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const key = document.getElementById('loginKey').value.trim();

            const errorEl = document.getElementById('errorMessage');
            const btn = document.getElementById('loginBtn');

            errorEl.style.display = 'none';
            errorEl.textContent = '';

            if (!username || !password || !key) {
                errorEl.textContent = 'Пожалуйста, заполните все поля.';
                errorEl.style.display = 'block';
                return;
            }

            btn.classList.add('loading');

            try {
                // 1. Проверка логина/пароля
                const usersData = await loadFile('fucktuzguard.txt');
                let userFound = false;
                for (const line of usersData) {
                    const parts = line.split(/\s+/);
                    if (parts.length >= 2) {
                        const storedLogin = parts[0];
                        const storedPass = parts.slice(1).join(' ');
                        if (storedLogin === username && storedPass === password) {
                            userFound = true;
                            break;
                        }
                    }
                }
                if (!userFound) throw new Error('Неверный логин или пароль.');

                // 2. Проверка ключа и извлечение даты окончания
                const keysData = await loadFile('timofeebtuzguardebeal.txt');
                let keyFound = false;
                let expiryDateStr = '';

                for (const line of keysData) {
                    const parts = line.split(/\s+/);
                    if (parts.length >= 2) {
                        const storedKey = parts[0];
                        const datePart = parts.slice(1).join(' '); // дата может содержать пробелы? обычно нет
                        if (storedKey === key) {
                            keyFound = true;
                            expiryDateStr = datePart.trim();
                            break;
                        }
                    }
                }

                if (!keyFound) throw new Error('Неверный ключ активации.');

                // Проверяем, что дата валидна
                const parsedDate = new Date(expiryDateStr);
                if (isNaN(parsedDate.getTime())) {
                    throw new Error('Некорректная дата окончания подписки в файле ключей.');
                }

                // 3. Сохраняем данные пользователя
                const userData = {
                    username: username,
                    expiry: parsedDate.toISOString()
                };
                localStorage.setItem('voidware_user', JSON.stringify(userData));

                // Перенаправление
                window.location.href = 'timofeentuzguard.html';

            } catch (err) {
                errorEl.textContent = err.message || 'Ошибка при входе. Попробуйте позже.';
                errorEl.style.display = 'block';
            } finally {
                btn.classList.remove('loading');
            }
        });
    </script>

</body>
</html>
